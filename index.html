<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacotherapy Final Test</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        background-color: #f8f9fa;
        color: #333;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* 좌측 사이드바 */
    .sidebar {
        width: 250px;
        background-color: #f1f3f5;
        border-right: 1px solid #dee2e6;
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .sidebar-header {
        padding: 15px;
        background-color: #e9ecef;
        font-weight: bold;
        color: #0d6efd;
        border-bottom: 1px solid #dee2e6;
    }
    .nav-grid-container {
        padding: 15px;
        overflow-y: auto;
        flex-grow: 1;
    }
    .nav-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
    }
    .nav-btn {
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 3px;
        padding: 8px 0;
        text-align: center;
        cursor: pointer;
        font-size: 14px;
        position: relative;
    }
    .nav-btn.answered {
        background: linear-gradient(to bottom, #fff 50%, #adb5bd 50%);
    }
    .nav-btn.active {
        border: 2px solid #000;
        font-weight: bold;
    }
    .nav-btn.flagged::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        border-width: 0 10px 10px 0;
        border-style: solid;
        border-color: transparent red transparent transparent;
    }
    .sidebar-footer {
        padding: 15px;
        border-top: 1px solid #dee2e6;
    }
    .submit-link {
        color: #0d6efd;
        text-decoration: none;
        cursor: pointer;
    }
    .submit-link:hover { text-decoration: underline; }

    /* 메인 콘텐츠 영역 */
    .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow-y: auto;
    }
    .breadcrumb {
        padding: 15px 30px;
        background-color: #fff;
        border-bottom: 1px solid #dee2e6;
        color: #6c757d;
        font-size: 14px;
    }
    
    /* 퀴즈 UI */
    #quiz-container {
        padding: 30px;
        max-width: 900px;
    }
    .question-layout {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .info-box {
        width: 130px;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        padding: 15px;
        font-size: 13px;
        height: fit-content;
    }
    .info-box h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
    }
    .flag-btn {
        color: #212529;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        margin-top: 15px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .flag-btn:hover { text-decoration: underline; }
    
    .question-box {
        flex-grow: 1;
        background-color: #f1f8ff; /* 연한 파란색 배경 */
        border: 1px solid #bce8f1;
        padding: 20px;
    }
    .guideline-text {
        font-weight: bold;
        margin-bottom: 15px;
        font-size: 15px;
    }
    .question-text {
        font-size: 15px;
        margin-bottom: 20px;
        line-height: 1.5;
    }
    .option {
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        font-size: 15px;
    }
    .option input {
        margin-right: 10px;
        cursor: pointer;
    }
    .clear-choice {
        display: inline-block;
        margin-top: 15px;
        color: #0d6efd;
        cursor: pointer;
        font-size: 14px;
    }
    .clear-choice:hover { text-decoration: underline; }

    .nav-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
    }
    .btn {
        padding: 8px 16px;
        border: 1px solid #ced4da;
        background-color: #fff;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
    }
    .btn-primary {
        background-color: #0d6efd;
        color: white;
        border-color: #0d6efd;
    }
    .btn-primary:hover { background-color: #0b5ed7; }

    /* 결과 화면 UI */
    #results-container {
        padding: 30px;
        max-width: 900px;
        display: none;
    }
    .result-item {
        background-color: #fff;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        padding: 20px;
        margin-bottom: 15px;
    }
    .result-item.correct { border-left: 5px solid #198754; }
    .result-item.incorrect { border-left: 5px solid #dc3545; }
    .status-badge {
        font-weight: bold;
        margin-bottom: 10px;
        display: inline-block;
    }
    .status-correct { color: #198754; }
    .status-incorrect { color: #dc3545; }

    /* --- 여기서부터 모바일 반응형 UI 코드 --- */
    @media (max-width: 768px) {
        body {
            flex-direction: column; /* 화면을 좌우가 아닌 위아래로 배치 */
            overflow: auto; /* 모바일에서는 전체 스크롤 허용 */
            height: auto;
        }
        .sidebar {
            width: 100%; /* 사이드바를 가로 꽉 차게 */
            height: auto;
            order: 2; /* 사이드바(문항 네비게이션)를 화면 맨 아래로 이동 */
            border-right: none;
            border-top: 2px solid #dee2e6;
        }
        .main-content {
            order: 1; /* 문제 영역을 화면 맨 위로 배치 */
            overflow-y: visible;
        }
        #quiz-container {
            padding: 15px; /* 모바일에서는 양옆 여백 축소 */
        }
        .question-layout {
            flex-direction: column; /* 정보 박스와 문제 박스를 좌우가 아닌 위아래로 스택 */
            gap: 10px;
        }
        .info-box {
            width: auto; /* 너비 제한 해제 */
            display: flex; /* 요소들을 가로로 나열 */
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
        }
        .info-box h3 {
            margin: 0;
        }
        #q-status-display {
            margin-bottom: 0 !important;
        }
        .flag-btn {
            margin-top: 0;
        }
        .breadcrumb {
            padding: 10px 15px;
            font-size: 12px;
        }
    }

</style>
</head>

<div class="main-content">

    </div>

    <div id="results-container">

        <div id="results-list"></div>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="location.reload()">다시 풀기</button>
    </div>
</div>

        { guideline: "[2022 Guideline for the Management of Heart Failure]", text: "34. In patients with HF who have fluid retention, ( ) are recommended to relieve congestion, improve symptoms, and prevent worsening HF.", options: ["ACEi", "diuretics", "SGLT2i", "beta blockers"], answer: 1 },
        { guideline: "[2022 Guideline for the Management of Heart Failure]", text: "35. Which medications that may cause or exacerbate HF?", options: ["NSAIDS", "Saxagliptin", "Thiazolidinediones", "1,2", "2,3", "1,3", "1,2,3"], answer: 6 },

        { guideline: "[2019 Guideline for the Management of Patients With Atrial Fibrillation]", text: "36. Which medication is NOT recommended for selecting anticoagulant in patients with AF and an elevated CHA2DS2-VASc score of 2 or greater in men or 3 or greater in women?", options: ["Dabigatran", "Rivaroxaban", "Aspirin", "Apixaban"], answer: 2 },
        { guideline: "[2019 Guideline for the Management of Patients With Atrial Fibrillation]", text: "37. Among patients treated with warfarin, ( ) should be determined at least weekly during initiation of anticoagulant therapy and at least monthly when anticoagulation is stable.", options: ["Anti-factor Xa", "INR", "aPTT", "PT"], answer: 1 },
        { guideline: "[2019 Guideline for the Management of Patients With Atrial Fibrillation]", text: "38. ( ) and hepatic function should be evaluated before initiation of a DOAC and should be reevaluated at least annually.", options: ["Cognitive function", "Pulmonary function", "Renal function", "Gl function"], answer: 2 },
        { guideline: "[2019 Guideline for the Management of Patients With Atrial Fibrillation]", text: "39. ( ) is recommended for the reversal of dabigatran in the event of life-threatening bleeding or an urgent procedure.", options: ["Idarucizumab", "Ciraparantag", "Andexanet", "Vitamin K"], answer: 0 },
        { guideline: "[2019 Guideline for the Management of Patients With Atrial Fibrillation]", text: "40. Intravenous ( ) are recommended to slow a rapid ventricular response to AF in patients with ACS who do not display HF, hemodynamic instability, or bronchospasm.", options: ["calcium channel blockers", "ACE inhibitors", "alpha blockers", "beta blockers"], answer: 3 }
    ];

    let currentQuestion = 0;
    const userAnswers = new Array(quizData.length).fill(null);
    const flaggedQuestions = new Array(quizData.length).fill(false);

    function init() {
        renderNavGrid();
        renderQuestion(currentQuestion);
    }

    function renderNavGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        for (let i = 0; i < quizData.length; i++) {
            const btn = document.createElement('div');
            btn.className = 'nav-btn';
            if (i === currentQuestion) btn.classList.add('active');
            if (userAnswers[i] !== null) btn.classList.add('answered');
            if (flaggedQuestions[i]) btn.classList.add('flagged');
            btn.innerText = i + 1;
            btn.onclick = () => {
                currentQuestion = i;
                renderQuestion(currentQuestion);
            };
            grid.appendChild(btn);
        }
    }

    function renderQuestion(index) {
        const q = quizData[index];
        
        document.getElementById('q-number-display').innerText = `Question ${index + 1}`;
        document.getElementById('q-status-display').innerText = userAnswers[index] !== null ? 'Complete' : 'Not yet answered';
        const flagBtn = document.getElementById('flag-btn-display');
        flagBtn.innerHTML = flaggedQuestions[index] ? '🚩 Remove flag' : '🚩 Flag question';

        const guidelineDisplay = document.getElementById('guideline-display');
        if (q.guideline) {
            guidelineDisplay.innerText = q.guideline;
            guidelineDisplay.style.display = 'block';
        } else {
            guidelineDisplay.style.display = 'none';
        }

        document.getElementById('q-text-display').innerText = q.text;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'question_option';
            radio.id = `opt_${i}`;
            radio.checked = userAnswers[index] === i;
            radio.onchange = () => selectOption(i);
            
            const label = document.createElement('label');
            label.htmlFor = `opt_${i}`;
            label.innerText = `${i + 1}. ${opt}`;
            
            div.appendChild(radio);
            div.appendChild(label);
            optionsContainer.appendChild(div);
        });

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        prevBtn.style.visibility = index === 0 ? 'hidden' : 'visible';
        
        if (index === quizData.length - 1) {
            nextBtn.innerText = 'Finish attempt ...';
            nextBtn.onclick = showResults;
        } else {
            nextBtn.innerText = 'Next page';
            nextBtn.onclick = () => changeQuestion(1);
        }

        renderNavGrid();
    }

    function selectOption(optIndex) {
        userAnswers[currentQuestion] = optIndex;
        document.getElementById('q-status-display').innerText = 'Complete';
        renderNavGrid();
    }

    function clearChoice() {
        userAnswers[currentQuestion] = null;
        renderQuestion(currentQuestion);
    }

    function changeQuestion(step) {
        currentQuestion += step;
        renderQuestion(currentQuestion);
    }

    function toggleFlag() {
        flaggedQuestions[currentQuestion] = !flaggedQuestions[currentQuestion];
        renderQuestion(currentQuestion);
    }

    function showResults() {
        if (!confirm('정말 답안을 제출하시겠습니까?')) return;

        document.getElementById('quiz-container').style.display = 'none';
        document.querySelector('.sidebar').style.display = 'none';
        const resultsContainer = document.getElementById('results-container');
        resultsContainer.style.display = 'block';

        const list = document.getElementById('results-list');
        list.innerHTML = '';

        quizData.forEach((q, i) => {
            const item = document.createElement('div');
            const isCorrect = userAnswers[i] === q.answer;
            item.className = `result-item ${isCorrect ? 'correct' : 'incorrect'}`;

            const statusText = isCorrect ? '<span class="status-badge status-correct">✔ 정답</span>' : '<span class="status-badge status-incorrect">✘ 오답</span>';
            const userAnswerText = userAnswers[i] !== null ? q.options[userAnswers[i]] : '응답 안 함';
            const correctAnswerText = q.options[q.answer];

            item.innerHTML = `
                ${statusText}
                <div style="color: #0d6efd; font-size: 14px; margin-bottom: 5px;">${q.guideline || ''}</div>
                <div style="font-weight: bold; margin-bottom: 10px;">${q.text}</div>
                <div style="margin-bottom: 5px; color: #6c757d;">나의 답: ${userAnswerText}</div>
                ${!isCorrect ? `<div style="color: #198754; font-weight: bold;">정답: ${correctAnswerText}</div>` : ''}
            `;
            list.appendChild(item);
        });
    }

    init();
</script>
</body>
</html>
